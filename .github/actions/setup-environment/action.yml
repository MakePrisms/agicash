name: 'Setup Environment'
description: 'Sets up Agicash development environment'
runs:
  using: composite
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.2.22

    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile

    # Remove TLS certificate configuration that is only needed for local development
    # Without this, Supabase would try to use the certificate and fail because it's not available in CI.
    - name: Remove TLS config from Supabase
      shell: bash
      run: |
        sed -i.bak '/cert_path = "..\/certs\/localhost-cert.pem"/d' supabase/config.toml
        sed -i.bak '/key_path = "..\/certs\/localhost-key.pem"/d' supabase/config.toml
        rm -f supabase/config.toml.bak
