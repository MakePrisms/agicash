name: Rust

on:
  pull_request:
    paths:
      - "crates/**"
      - ".github/workflows/rust.yml"
  push:
    branches:
      - master
      - "feat/rust-*"
    paths:
      - "crates/**"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
      - run: cargo test --workspace

  # Surface-break gate: runs on every push to feat/rust-* branches
  # (slice merges land here before they ever become PRs). Catches the
  # class of rot where a slice splits a CLI/FFI surface and leaves
  # pre-existing tests in sibling crates referring to the old shape.
  #
  # Two layers:
  #  1. cargo test --workspace          — runs all non-gated tests
  #  2. cargo check --all-features      — *compiles* the network-gated
  #     real-* integration tests so a renamed subcommand or moved
  #     symbol fails the build instead of silently no-op'ing.
  #
  # Does NOT execute real-network tests; those need a separate lane
  # (local supabase + opensecret + mint stack).
  workspace-surface-gate:
    name: cargo test + check --all-features (workspace)
    if: github.event_name == 'push' && startsWith(github.ref_name, 'feat/rust-')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
      - name: cargo test --workspace (no features)
        run: cargo test --workspace
      - name: cargo check --workspace --all-targets --all-features
        # Compile-only pass for the real-* gated tests so surface
        # breaks (renamed subcommands, moved symbols, changed APIs)
        # fail CI instead of silently no-op'ing under cfg(feature).
        run: cargo check --workspace --all-targets --all-features

  wasm-build:
    name: cargo build wasm32
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
      - run: cargo build --target wasm32-unknown-unknown -p agicash-wasm
