<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>Agicash</title>

    <link rel="manifest" href="public/manifest.json" />
    <link rel="icon" type="image/x-icon" href="public/favicon.ico" />
    <link rel="apple-touch-icon" href="public/icon-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!--
      Runtime endpoint config — read by `src/config.rs::AppConfig::load`
      via `document.querySelector('meta[name="..."]')` on hydrate.

      Default values point at the LOCAL stack (matches
      `nix/shells/default.nix`). To switch to PROD (the cross-platform
      demo against `damian+3@agi.cash`), uncomment the PROD block below
      and comment out the DEV block. Or edit the values in place. No
      recompile required — the wasm bundle reads these at startup.

      The Supabase anon key is a public-by-design JWT enforced by RLS
      on the server; safe to commit / serve to browsers.
    -->
    <!-- DEV (local stack) -->
    <meta name="opensecret-base-url" content="http://127.0.0.1:3999" />
    <meta name="opensecret-client-id" content="ba5a14b5-d915-47b1-b7b1-afda52bc5fc6" />
    <meta name="supabase-url" content="https://127.0.0.1:54321" />
    <meta name="supabase-anon-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" />
    <!-- PROD (cross-platform demo against damian+3@agi.cash):
    <meta name="opensecret-base-url" content="https://enclave.trymaple.ai" />
    <meta name="opensecret-client-id" content="a5e351d4-6dd9-4ee6-8e36-f5fb871e5432" />
    <meta name="supabase-url" content="https://szuncqupizxelsxkxlpq.supabase.co" />
    <meta name="supabase-anon-key" content="<PROD_SUPABASE_ANON_KEY_GOES_HERE>" />
    -->


    <!--
      Fonts from the design-tokens system (design/tokens.json):
      Kode Mono for UI text, Teko for monetary numerics.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&family=Teko:wght@300..700&display=swap"
    />
    <link rel="stylesheet" href="style/main.css" />
  </head>
  <body>
    <!--
      Pure CSR boot: wasm-pack emits pkg/agicash_web_leptos.js +
      pkg/agicash_web_leptos_bg.wasm. The js glue's default export is
      the `init` function (returns once the wasm is instantiated);
      `hydrate` is the wasm-bindgen-exported entry from lib.rs that
      mounts the Leptos component tree onto <body>.
    -->
    <script type="module">
      import init, { hydrate } from "./pkg/agicash_web_leptos.js";
      await init();
      hydrate();
    </script>

    <script>
      // Best-effort service-worker registration (same logic that used
      // to live inside the SSR shell). Browsers without SW support
      // silently skip.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("public/service-worker.js")
            .catch(function () {});
        });
      }
    </script>
  </body>
</html>
